# This workflow installs dependencies, builds the portfolio, and restarts
# the applications managed by PM2 on the self-hosted server.

name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    env:
      HOME: /root
      PM2_HOME: /root/.pm2

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Check for PM2 processes
        id: pm2_check
        run: |
          if /usr/bin/pm2 jlist | grep -q '"name"'; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop all PM2 processes
        if: steps.pm2_check.outputs.exists == 'true'
        run: /usr/bin/pm2 stop all

      - name: Install npm packages
        run: npm ci

      - name: Build for production
        run: npm run build --if-present

      - name: Create portfolio PM2 process
        if: success() && steps.pm2_check.outputs.exists == 'false'
        run: /usr/bin/pm2 start npm --name portfolio -- start

      - name: Restart all PM2 processes
        if: always()
        run: /usr/bin/pm2 restart all || true

      - name: Save PM2 process list
        if: success()
        run: /usr/bin/pm2 save
